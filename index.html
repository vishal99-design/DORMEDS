<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="DORMEDS — India's smartest medicine delivery platform. Order medicines, upload prescriptions, and track delivery in real-time from nearby pharmacies." />
  <meta name="keywords" content="medicine delivery, pharmacy, prescription, India, DORMEDS" />
  <meta name="author" content="DORMEDS" />
  <meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#F8FAFF" media="(prefers-color-scheme: light)" />

  <!-- PWA / Mobile App -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DORMEDS" />
  <meta name="application-name" content="DORMEDS" />

  <!-- Open Graph -->
  <meta property="og:title" content="DORMEDS — Fast Medicine Delivery" />
  <meta property="og:description" content="Order medicines from nearby pharmacies with real-time tracking & prescription verification." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="DORMEDS — Fast Medicine Delivery" />
  <meta name="twitter:description" content="India's smartest pharmacy delivery platform." />

  <title>DORMEDS — Fast Medicine Delivery</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>" />
  <link rel="apple-touch-icon" href="assets/icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="toast-container" class="toast-container"></div>
  <div id="modal-root"></div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
