<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DORMEDS</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<h2>Upload Prescription</h2>

<input type="file" id="prescriptionFile">
<button onclick="uploadPrescription()">Process Prescription</button>

<h3>Original:</h3>
<img id="preview" width="200">

<h3>Extracted Text (AI):</h3>
<p id="convertedText">Waiting...</p>

<h3>Pharmacy Decision:</h3>
<button onclick="acceptPrescription()">Accept</button>
<button onclick="rejectPrescription()">Reject</button>

<p id="status"></p>

<hr>

<h2>Search Medicine</h2>
<input type="text" id="searchInput" placeholder="Enter medicine name">
<button onclick="searchMedicine()">Search</button>

<p id="result"></p>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
